<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>門市地址</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
#map{height:100vh;width:100%;}

/* 右上角門市切換 (更新為白底紫字，點擊/懸停變紫底白字) */
.store-buttons{
  position:absolute;top:15px;right:15px;
  z-index:1000;display:flex;flex-direction:column;gap:8px;
}
.store-buttons button{
  padding:10px 18px;
  border:2px solid #6C2F86; /* 紫色邊框 */
  border-radius:20px;
  background:#ffffff;       /* 預設白底 */
  color:#6C2F86;            /* 預設紫字 */
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  transition: background 0.3s, color 0.3s; /* 平滑過渡動畫 */
}
/* 滑鼠懸停 與 點擊後啟用狀態 */
.store-buttons button:hover,
.store-buttons button.active {
  background:#6C2F86;
  color:#ffffff;
}

/* Popup */
.leaflet-popup-content-wrapper{
  border-radius:12px;
  box-shadow:0 10px 24px rgba(0,0,0,.2);
}
.info-card{max-width:300px;}
.info-title{font-size:16px;font-weight:600;margin-bottom:8px;}
.info-text{font-size:14px;margin-bottom:4px;color:#222;}
.mtr-note{font-size:13px;color:#666;margin-bottom:6px;}

/* 導航按鈕 (套用 CSS Mask 免做兩套圖技術) */
.nav-row{
  display:flex;
  justify-content:center;
  gap:24px;
  margin-top:16px;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}
.nav-circle{
  width:56px;
  height:56px;
  border-radius:50%;
  background:#ffffff;           /* 預設白底 */
  border: 2px solid #6C2F86;    /* 預設紫框 */
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s ease;
}
/* 圖示遮罩區域設定 */
.nav-icon {
  width:35px;
  height:35px;
  background-color: #6C2F86;    /* 預設紫色圖示 */
  transition: background-color .3s ease;
}

/* 導航按鈕：滑鼠懸停變色 */
.nav-circle:hover{
  background:#6C2F86;           /* 紫底 */
  transform:scale(1.08);
}
.nav-circle:hover .nav-icon {
  background-color: #ffffff;    /* 白圖 */
}

.nav-label{
  font-size:11px;
  color:#444;
  margin-top:6px;
}

/* 紫色定位 */
.google-pin{
  position:relative;
  width:29px;
  height:29px;
  background:#6C2F86;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2.5px solid white;
  box-shadow:0 6px 16px rgba(0,0,0,.35);
}
.pin-inner{
  position:absolute;
  width:12px;
  height:12px;
  background:white;
  border-radius:50%;
  top:8px;
  left:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="store-buttons">
  <button class="active" data-key="tsuenwan" onclick="goToStore('tsuenwan')">荃灣門市</button>
  <button data-key="laichikok" onclick="goToStore('laichikok')">荔枝角活動室</button>
</div>

<script>

var map=L.map('map',{minZoom:12,maxZoom:19});

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
{attribution:'Tiles © Esri',maxZoom:19}
).addTo(map);

var dotIcon=L.divIcon({
  className:"",
  html:`<div class="google-pin"><div class="pin-inner"></div></div>`,
  iconSize:[36,48],
  iconAnchor:[18,48]
});

var stores={
  tsuenwan:{
    name:"荃灣門市",
    lat:22.37367,lng:114.11634,
    address:"荃灣南豐中心17樓1714室",
    mtr:"（荃灣港鐵站 A 出口）",
    phone:"5977 6032 / 5961 6332",
    hours:"10:00 - 19:00"
  },
  laichikok:{
    name:"荔枝角活動室",
    lat:22.3367,lng:114.1494,
    address:"長沙灣長義街2-4號新昌工業大廈11樓1103B室",
    mtr:"（荔枝角港鐵站 D2 出口）",
    phone:"-",
    hours:"9:00 - 18:00"
  }
};

var markers={};

// 建立標記點與對應的彈出視窗
for(var key in stores){
  var s=stores[key];

  var marker=L.marker([s.lat,s.lng],{icon:dotIcon})
  .addTo(map)
  .bindPopup(`
    <div class="info-card">
      <div class="info-title">${s.name}</div>
      <div class="info-text">地址：${s.address}</div>
      <div class="mtr-note">${s.mtr}</div>
      <div class="info-text">電話：${s.phone}</div>
      <div class="info-text">營業時間：${s.hours}</div>

      <div class="nav-row">
        <div class="nav-item" onclick="smartNavigate(${
