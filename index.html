<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>門市地址</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

#map{
  height:100vh;
  width:100%;
  position:relative;
  z-index:1;
}

/* ======================
   右上角門市按鈕（膠囊版）
====================== */

.store-buttons{
  position:absolute;
  top:20px;
  right:20px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.store-buttons button{
  min-width:140px;
  padding:12px 26px;
  border-radius:40px;
  border:none;
  background:#ffffff;
  color:#6C2F86;
  font-size:15px;
  font-weight:600;
  letter-spacing:1px;
  cursor:pointer;
  transition:.25s ease;
  box-shadow:0 8px 22px rgba(108,47,134,.25);
}

.store-buttons button:hover{
  background:#6C2F86;
  color:#ffffff;
  box-shadow:0 10px 26px rgba(108,47,134,.35);
  transform:translateY(-2px);
}

.store-buttons button.active{
  background:#6C2F86;
  color:#ffffff;
  box-shadow:0 10px 26px rgba(108,47,134,.35);
}

/* ======================
   Popup 設計
====================== */

.leaflet-popup-content-wrapper{
  border-radius:14px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}

.info-card{max-width:300px;}
.info-title{font-size:16px;font-weight:600;margin-bottom:8px;}
.info-text{font-size:14px;margin-bottom:4px;color:#222;}
.mtr-note{font-size:13px;color:#666;margin-bottom:6px;}

/* ======================
   導航按鈕（陰影版）
====================== */

.nav-row{
  display:flex;
  justify-content:center;
  gap:24px;
  margin-top:16px;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.nav-circle{
  width:56px;
  height:56px;
  border-radius:50%;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.25s;
  box-shadow:0 6px 18px rgba(108,47,134,.18);
}

/* 預設 icon 轉色 */
.nav-circle img{
  width:30px;
  height:30px;
  object-fit:contain;
  filter: brightness(0) saturate(100%) invert(17%) sepia(78%) saturate(1436%) hue-rotate(262deg) brightness(92%) contrast(92%);
}

/* Hover / Active */
.nav-item:hover .nav-circle,
.nav-item.active .nav-circle{
  background:#6C2F86;
  box-shadow:0 8px 22px rgba(108,47,134,.35);
}

.nav-item:hover img,
.nav-item.active img{
  filter: brightness(0) invert(1);
}

.nav-label{
  font-size:11px;
  color:#444;
  margin-top:6px;
}

/* ======================
   紫色定位圖示
====================== */

.google-pin{
  position:relative;
  width:29px;
  height:29px;
  background:#6C2F86;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2.5px solid white;
  box-shadow:0 6px 16px rgba(0,0,0,.35);
}

.pin-inner{
  position:absolute;
  width:12px;
  height:12px;
  background:white;
  border-radius:50%;
  top:8px;
  left:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="store-buttons">
  <button id="btn-tsuenwan" onclick="goToStore('tsuenwan')">荃灣門市</button>
  <button id="btn-laichikok" onclick="goToStore('laichikok')">荔枝角活動室</button>
</div>

<script>

var map=L.map('map',{minZoom:11,maxZoom:19});

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
{attribution:'Tiles © Esri'}
).addTo(map);

map.setView([22.36,114.13],12);

var dotIcon=L.divIcon({
  className:"",
  html:'<div class="google-pin"><div class="pin-inner"></div></div>',
  iconSize:[36,48],
  iconAnchor:[18,48]
});

var stores={
  tsuenwan:{
    name:"荃灣門市",
    lat:22.37367,lng:114.11634,
    address:"荃灣南豐中心17樓1714室",
    mtr:"（荃灣港鐵站 A 出口）",
    phone:"5977 6032 / 5961 6332",
    hours:"10:00 - 19:00"
  },
  laichikok:{
    name:"荔枝角活動室",
    lat:22.3367,lng:114.1494,
    address:"長沙灣長義街2-4號新昌工業大廈11樓1103B室",
    mtr:"（荔枝角港鐵站 D2 出口）",
    phone:"-",
    hours:"9:00 - 18:00"
  }
};

var markers={};

for(var key in stores){
  var s=stores[key];

  var marker=L.marker([s.lat,s.lng],{icon:dotIcon})
  .addTo(map)
  .bindPopup(
    '<div class="info-card">'+
      '<div class="info-title">'+s.name+'</div>'+
      '<div class="info-text">地址：'+s.address+'</div>'+
      '<div class="mtr-note">'+s.mtr+'</div>'+
      '<div class="info-text">電話：'+s.phone+'</div>'+
      '<div class="info-text">營業時間：'+s.hours+'</div>'+

      '<div class="nav-row">'+
        createNavButton(s.lat,s.lng,'transit','transit.png','公共交通')+
        createNavButton(s.lat,s.lng,'driving','drive.png','駕車')+
        createNavButton(s.lat,s.lng,'walking','walk.png','步行')+
      '</div>'+
    '</div>'
  );

  markers[key]=marker;
}

function createNavButton(lat,lng,mode,icon,label){
  return '<div class="nav-item" onclick="selectNav(this); smartNavigate('+lat+','+lng+',\''+mode+'\')">'+
           '<div class="nav-circle"><img src="'+icon+'"></div>'+
           '<div class="nav-label">'+label+'</div>'+
         '</div>';
}

function goToStore(key){
  var s=stores[key];
  map.flyTo([s.lat,s.lng],18,{duration:0.6});
  markers[key].openPopup();

  document.querySelectorAll('.store-buttons button')
    .forEach(btn=>btn.classList.remove('active'));

  document.getElementById('btn-'+key).classList.add('active');
}

function selectNav(el){
  el.parentElement.querySelectorAll('.nav-item')
    .forEach(item=>item.classList.remove('active'));
  el.classList.add('active');
}

function smartNavigate(lat,lng,mode){
  window.open(
    'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng+'&travelmode='+mode,
    '_blank'
  );
}

/* 點地圖空白 → 按鈕恢復白底 */
map.on('click', function () {
  document.querySelectorAll('.store-buttons button')
    .forEach(btn => btn.classList.remove('active'));
});

</script>
</body>
</html>
